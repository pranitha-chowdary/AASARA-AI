services:
  # ── AASARA Backend (Node / Express) ─────────────────────────────────────────
  - type: web
    name: aasara-backend
    runtime: node
    rootDir: backend/server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Set the remaining vars in the Render dashboard (they contain secrets):
      # MONGODB_URI, JWT_SECRET
      # TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_PHONE_NUMBER
      # BREVO_API_KEY, BREVO_SENDER_EMAIL, BREVO_SENDER_NAME
      # RAZORPAY_KEY_ID, RAZORPAY_KEY_SECRET
      # OPENWEATHERMAP_API_KEY
      # ML_ENGINE_URL   ← set to your aasara-ml-engine Render URL after it deploys
      # CORS_ALLOWED_ORIGINS  ← set to your Netlify URL after it deploys

  # ── AASARA ML Engine (Python / Flask) ───────────────────────────────────────
  - type: web
    name: aasara-ml-engine
    runtime: python
    rootDir: backend/ml_engine
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      # Set in Render dashboard:
      # OPENWEATHERMAP_API_KEY
      # NEWSDATA_API_KEY  (optional — runs simulation mode without it)
